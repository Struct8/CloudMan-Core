name: "CloudMan Engine: Lambda Sync"

on:
  workflow_call:
    inputs:
      # 1. Parâmetros de Operação
      direction:
        type: string
        description: "push (AWS->Git), pull (Git->AWS) or create"
        required: true
      region:
        type: string
        description: "Default AWS Region"
        default: "us-east-1"
      role_arn:
        type: string
        description: "IAM Role to Assume via OIDC"
        required: true
      resources_json:
        type: string
        description: "JSON Array of resources to sync"
        required: true

      # 2. Parâmetros do Repositório Alvo (Onde o código vive)
      target_repo:
        type: string
        description: "Target Repository (Org/Repo)"
        required: true
      target_branch:
        type: string
        description: "Target Branch"
        default: "main"

      # 3. Autenticação Automatizada (GitHub App Token)
      git_token:
        type: string
        description: "App Token passed from caller"
        required: true

  workflow_dispatch:
    inputs:
      direction: { required: true }
      region: { default: "us-east-1" }
      role_arn: { required: true }
      resources_json: { required: true }
      target_repo: { required: true }
      target_branch: { default: "main" }
      git_token: { required: true }

permissions:
  id-token: write   # Autenticação AWS
  contents: write   # Git Push

jobs:
  sync-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Mask Token
        run: echo "::add-mask::${{ inputs.git_token }}"

      # 1. PRIMEIRO: Checkout do Repositório do CLIENTE (Target)
      # Fazemos isso primeiro porque o checkout limpa a pasta de trabalho.
      - name: 📥 Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_branch }}
          token: ${{ inputs.git_token }}
          path: '.'

      # 2. SEGUNDO: Checkout do Repositório CORE (Engine)
      # Baixamos dentro da pasta .engine para que não seja apagado pelo passo anterior.
      - name: 📥 Checkout Engine Scripts
        uses: actions/checkout@v4
        with:
          repository: CloudManPro/CloudMan-Core
          path: '.engine'

      # 3. CONFIGURAR AWS
      - name: 🔑 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.region }}
          role-session-name: CloudManSyncSession

      # 4. EXECUTAR O ORQUESTRADOR
      - name: ⚡ Process Resources (Smart Engine)
        env:
          INPUT_DIRECTION: ${{ inputs.direction }}
          INPUT_RESOURCES: ${{ inputs.resources_json }}
          INPUT_REGION: ${{ inputs.region }}
        run: node .engine/scripts/aws_lambda_function/orchestrator.js

      # 5. COMMITAR MUDANÇAS (AWS -> Git)
      - name: 📝 Commit Changes
        if: inputs.direction == 'push' || inputs.direction == 'create'
        run: |
          git config user.name "CloudMan Bot"
          git config user.email "bot@cloudman.pro"
          
          # Adiciona as alterações de código das Lambdas
          git add .
          
          # IMPORTANTE: Garante que a pasta temporária .engine NÃO seja commitada no repo do cliente
          if [ -d ".engine" ]; then
            git reset .engine
          fi
          
          if ! git diff --staged --quiet; then
            git commit -m "cloudman(sync): Sync code from Cloud [skip ci]"
            git push
            echo "✅ Changes pushed successfully."
          else
            echo "✅ No changes to commit."
          fi
