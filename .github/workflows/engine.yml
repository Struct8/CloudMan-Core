name: Dynamic GitOps Engine (Full)

on:
  workflow_call:
    inputs:
      default_region:
        required: false
        type: string
        default: "us-east-1"
  workflow_dispatch:
  push:
    paths:
      - '**/manifest.json'
      - '**/main.tf'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Client Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # INICIO DA MODIFICAÇÃO
      - name: 🧐 Analyze Manifest Requirements
        id: manifest_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "🔍 Identificando qual pasta disparou o pipeline..."
          
          # 1. Tenta achar o manifesto na pasta que teve o código alterado
          MANIFEST_PATH=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep "manifest.json" | head -n 1 || true)
          
          # 2. Se for trigger manual ou não achar diff, pega o primeiro que encontrar (fallback)
          if [ -z "$MANIFEST_PATH" ] || [ ! -f "$MANIFEST_PATH" ]; then
            MANIFEST_PATH=$(find . -name "manifest.json" -not -path "*/.*" -print -quit)
          fi
          
          echo "========================================================="
          echo "📂 [LOG DE CAMINHO] MANIFESTO SELECIONADO NA ANÁLISE:"
          echo "Caminho: ${MANIFEST_PATH:-Nenhum encontrado}"
          echo "========================================================="

          if [ -z "$MANIFEST_PATH" ]; then
            echo "⚠️ Nenhum manifesto encontrado. Assumindo fluxo padrão (false)."
            echo "needs_private_access=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ ! -s "$MANIFEST_PATH" ]; then
             echo "⚠️ Arquivo manifest.json existe mas está vazio."
             echo "needs_private_access=false" >> $GITHUB_OUTPUT
             exit 0
          fi

          if ! jq -e . "$MANIFEST_PATH" >/dev/null 2>&1; then
             echo "❌ ERRO CRÍTICO: O arquivo $MANIFEST_PATH contém JSON inválido."
             exit 1
          fi

          EXTERNAL_REPOS=$(jq -c '.external_repositories // []' "$MANIFEST_PATH")
          NEEDS_ACCESS="false"
          
          if [ "$EXTERNAL_REPOS" != "[]" ] && [ "$EXTERNAL_REPOS" != "null" ]; then
            echo "📦 Verificando visibilidade dos repositórios externos..."
            
            while IFS= read -r repo; do
              ORG=$(echo "$repo" | jq -r '.org')
              REPO_NAME=$(echo "$repo" | jq -r '.repo_name')
              
              echo "🔍 Checando API do GitHub para: $ORG/$REPO_NAME"
              
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$ORG/$REPO_NAME")
                
              if [ "$HTTP_STATUS" == "200" ]; then
                echo "   ✅ Público (HTTP 200). Não requer token externo."
              else
                echo "   🔒 Privado (HTTP $HTTP_STATUS). Requer token do backend!"
                NEEDS_ACCESS="true"
                break
              fi
            done < <(echo "$EXTERNAL_REPOS" | jq -c '.[]')
          else
            echo "ℹ️ Nenhum repositório externo declarado no manifesto."
          fi

          echo "📊 Resultado da análise Gatekeeper: $NEEDS_ACCESS"
          
          # SALVANDO NA MEMÓRIA PARA O RESTO DO PIPELINE
          echo "needs_private_access=$NEEDS_ACCESS" >> $GITHUB_OUTPUT
          echo "manifest_path=$MANIFEST_PATH" >> $GITHUB_OUTPUT

      - name: 🔑 CloudMan Auth Bridge
        id: gatekeeper
        # Só executa se o passo anterior detectou repositórios externos
        if: steps.manifest_check.outputs.needs_private_access == 'true'
        run: |
          echo "🔄 Iniciando troca de token OIDC..."
          ID_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&aud=https://github.com/cloudmandev" | jq -r '.value')
          
          RESPONSE=$(curl -s -X POST https://dev.callback.cloudman.pro/cb/CallBack-dev \
            -d "{\"action\": \"exchange_oidc_for_token\", \"params\": {\"oidc_token\": \"$ID_TOKEN\", \"github_repo\": \"CloudManPro/cloudman-core\"}}")
          
          TOKEN=$(echo $RESPONSE | jq -r .token)
          
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Falha na autenticação: $RESPONSE"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: 📥 Checkout CloudMan Engine
        uses: actions/checkout@v4
        with:
          repository: CloudManPro/cloudman-core
          path: .cloudman-engine
          ref: main
          # LÓGICA CRÍTICA:
          # Se o gatekeeper rodou, usa o token dele.
          # Se pulou, usa o GITHUB_TOKEN padrão (funciona se a Engine for pública ou interna à org)
          token: ${{ steps.gatekeeper.outputs.token || secrets.GITHUB_TOKEN }}

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"  # Adicione esta linha
          terraform_wrapper: false    # Recomendado para scripts bash complexos como o seu

      - name: 🚀 Executar Pipeline Modular
        shell: bash
        env:
          # Mesma lógica de fallback aqui para o clone dentro do script
          GH_CLONE_TOKEN: ${{ steps.gatekeeper.outputs.token || secrets.GITHUB_TOKEN }}
          LOGIN_REGION: ${{ inputs.default_region || 'us-east-1' }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: |
          # ==============================================================================
          # CONFIGURAÇÕES E CORES
          # ==============================================================================
          set -o pipefail
          BLUE='\033[0;34m'
          CYAN='\033[0;36m'
          GREEN='\033[0;32m'
          YELLOW='\033[0;33m'
          RED='\033[0;31m'
          NC='\033[0m'

          ENGINE_PATH=$(readlink -f .cloudman-engine)
          AUTH_SCRIPTS="$ENGINE_PATH/scripts/auth"
          
          if [ ! -d "$AUTH_SCRIPTS" ]; then
              echo "❌ Erro Crítico: Pasta scripts/auth não encontrada"
              exit 1
          fi
          
          chmod +x $AUTH_SCRIPTS/*.sh
          source "$AUTH_SCRIPTS/aws.sh"

          # ==============================================================================
          # FUNÇÃO DE LOG DE DEBUG
          # ==============================================================================
          debug_auth_status() {
              local context=$1
              echo "🔎 [DEBUG] Verificando identidade ($context):"
              if [ -n "$AWS_PROFILE" ]; then echo "   - AWS_PROFILE: $AWS_PROFILE"; else echo "   - AWS_PROFILE: (unset)"; fi
              if [ -n "$AWS_REGION" ]; then echo "   - AWS_REGION: $AWS_REGION"; else echo "   - AWS_REGION: (unset)"; fi
              
              # Verifica identidade real (se tiver credenciais carregadas)
              aws sts get-caller-identity --query "Arn" --output text 2>/dev/null || echo "   - (Sem credenciais ativas no terminal)"
              echo "---------------------------------------------------"
          }

          # ==============================================================================
          # FUNÇÃO PRINCIPAL: Execução do Terraform
          # ==============================================================================
          run_terraform_process() {
              local path=$1
              local action=$2
              local auth_json=$3
              local provider=$4
              local label="[$path]"
              
              local color=$BLUE
              if [ "$provider" == "azure" ]; then color=$CYAN; fi
              if [ "$provider" == "cloudflare" ]; then color=$GREEN; fi
              if [ "$provider" == "google" ]; then color=$YELLOW; fi
              if [ "$provider" == "oci" ]; then color=$RED; fi

              (
                  cd "$path"

                  # ---------------------------------------------------------
                  # PASSO 1: TERRAFORM INIT
                  # ---------------------------------------------------------
                  echo -e "${color}▶️ ${label} Inicializando Backend (State)...${NC}"
                  
                  # Limpa ambiente para garantir que o Init use apenas o profile
                  unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN AWS_REGION

                  # SOLUÇÃO DO PROBLEMA DE LOCK:
                  # Injetamos '-backend-config="profile=backend"'
                  # Isso força o Terraform a salvar no .terraform/terraform.tfstate que
                  # ele DEVE usar o profile 'backend' para operações de estado (S3/Dynamo),
                  # ignorando as variáveis de ambiente que vamos carregar no passo 2.
                  
                  terraform init -reconfigure -input=false \
                      -backend-config="profile=backend" \
                      -backend-config="region=$BACKEND_REGION"

                  # ---------------------------------------------------------
                  # PASSO 2: PREPARAÇÃO DO TARGET
                  # ---------------------------------------------------------
                  
                  # Cloudflare handling
                  if [ "$provider" == "cloudflare" ]; then
                      # Prioriza o secret_name vindo do manifest, se não existir, usa o fallback antigo
                      local secret_key=$(echo "$auth_json" | jq -r '.secret_name // empty')
                      
                      if [ -z "$secret_key" ]; then
                          local acc_id=$(echo "$auth_json" | jq -r '.account_id')
                          secret_key="AUTH_CLOUDFLARE_${acc_id}"
                      fi
                  
                      echo "🔑 Buscando Secret: $secret_key"
                      local token=$(echo "$SECRETS_CONTEXT" | jq -r --arg key "$secret_key" '.[$key]')

                      if [ "$token" == "null" ] || [ -z "$token" ]; then
                          echo "❌ Erro: Secret '$secret_key' não encontrado."
                          exit 1
                      fi
                      export CLOUDFLARE_API_TOKEN="$token"
                  fi
                  
                  local script_file="$AUTH_SCRIPTS/${provider}.sh"
                  
                  if [ -f "$script_file" ]; then
                      echo "🔶 Autenticando $provider (target)..."
                      source "$script_file"
                      "auth_${provider}" "$auth_json" "target"
                      
                      # Debug: Mostra que agora estamos logados como TARGET
                      if [ "$provider" == "aws" ]; then
                          debug_auth_status "TARGET AUTH"
                      fi
                  else
                      if [ "$provider" != "cloudflare" ]; then
                           echo "⚠️  Aviso: Script de autenticação para '$provider' não encontrado."
                      fi
                  fi

                  # ---------------------------------------------------------
                  # PASSO 3: EXECUÇÃO DO TERRAFORM
                  # ---------------------------------------------------------
                  echo -e "${color}▶️ ${label} Executando Terraform $action...${NC}"

                  # Como configuramos o backend com profile=backend no init,
                  # o Terraform vai usar:
                  # 1. Profile 'backend' -> Para S3 e DynamoDB (Lock)
                  # 2. Env Vars (AWS_ACCESS_KEY...) -> Para o Provider AWS (Resources)
                  
                  if [ "$action" == "plan" ]; then
                    terraform plan -input=false
                  elif [ "$action" == "apply" ]; then
                    terraform apply -auto-approve -input=false
                  elif [ "$action" == "destroy" ]; then
                    terraform destroy -auto-approve -input=false
                  fi
              )

              return $?
          }

          # ==============================================================================
          # MAIN
          # ==============================================================================
          
          # RESGATANDO O CAMINHO SALVO NA MEMÓRIA DO PASSO 1
          MANIFEST_PATH="${{ steps.manifest_check.outputs.manifest_path }}"
          
          # LOG CLARO PARA DEPURAÇÃO
          echo "========================================================="
          echo "📂 [LOG DE CAMINHO] MANIFESTO RECUPERADO PARA EXECUÇÃO:"
          echo "Caminho: $MANIFEST_PATH"
          echo "========================================================="

          if [ -z "$MANIFEST_PATH" ] || [ ! -f "$MANIFEST_PATH" ]; then
            echo "❌ Erro Crítico: Caminho do manifest.json foi perdido entre os steps ou o arquivo sumiu."
            exit 1
          fi

          ACTION=$(jq -r '.action // "apply"' "$MANIFEST_PATH")
          
          # Exporta para ser visível dentro do subshell do terraform init
          export BACKEND_ROLE=$(jq -r '.backend_global_config.role_arn' "$MANIFEST_PATH")
          export BACKEND_REGION=$(jq -r '.backend_global_config.region' "$MANIFEST_PATH")

          echo "⚡ Ação Global: $ACTION"
          echo "🔑 Configurando Backend Profile..."
          
          # Cria o profile [backend] em ~/.aws/credentials
          auth_aws "{\"role_arn\": \"$BACKEND_ROLE\", \"region\": \"$BACKEND_REGION\"}" "backend"
          debug_auth_status "BACKEND PROFILE CRIADO"

          # ---------------------------------------------------------
          # DEPENDÊNCIAS EXTERNAS
          # ---------------------------------------------------------
          EXTERNAL_REPOS=$(jq -c '.external_repositories // []' "$MANIFEST_PATH")
          if [ "$EXTERNAL_REPOS" != "[]" ] && [ "$EXTERNAL_REPOS" != "null" ]; then
              echo "📦 Analisando dependências externas..."
              echo "$EXTERNAL_REPOS" | jq -c '.[]' | while read -r repo; do
                  REPO_NAME=$(echo "$repo" | jq -r '.repo_name')
                  ORG=$(echo "$repo" | jq -r '.org')
                  BRANCH=$(echo "$repo" | jq -r '.branch')
                  TARGET_DIR=$(echo "$repo" | jq -r '.target_dir')
                  FOLDERS=$(echo "$repo" | jq -r '.folders | join(" ")')
                  FULL_TARGET_DIR="./$TARGET_DIR"
                  REPO_URL="https://x-access-token:${GH_CLONE_TOKEN}@github.com/${ORG}/${REPO_NAME}.git"
                  
                  if [ ! -d "$FULL_TARGET_DIR" ]; then
                      echo "⬇️  Iniciando Sparse-Checkout de $ORG/$REPO_NAME..."
                      git clone --depth 1 -b "$BRANCH" --filter=blob:none --no-checkout "$REPO_URL" "$FULL_TARGET_DIR"
                      cd "$FULL_TARGET_DIR"
                      git sparse-checkout init --cone
                      git sparse-checkout set $FOLDERS
                      git checkout "$BRANCH"
                      cd - > /dev/null
                  else
                      echo "🔄 Atualizando pastas em $REPO_NAME..."
                      (cd "$FULL_TARGET_DIR" && git sparse-checkout set $FOLDERS && git pull origin "$BRANCH")
                  fi
              done
          fi

          # ---------------------------------------------------------
          # EXECUÇÃO DOS ESTÁGIOS
          # ---------------------------------------------------------
          TOTAL_STAGES=$(jq '.pipeline_stages | length' "$MANIFEST_PATH")

          for (( i=0; i<$TOTAL_STAGES; i++ )); do
              STAGE_NAME=$(jq -r ".pipeline_stages[$i].stage_name" "$MANIFEST_PATH")
              IS_PARALLEL=$(jq -r ".pipeline_stages[$i].parallel_execution" "$MANIFEST_PATH")
              STATES_JSON=$(jq -c ".pipeline_stages[$i].states[]" "$MANIFEST_PATH")

              echo "::group::🚀 Estágio: $STAGE_NAME"

              pids=""
              failed=0

              while read -r state; do
                  path=$(echo "$state" | jq -r '.path')
                  provider=$(echo "$state" | jq -r '.provider')
                  target_auth=$(echo "$state" | jq -c '.target_auth')
                  
                  if [ ! -d "$path" ]; then
                       echo "⚠️  Diretório $path não existe. Pulando."
                       continue
                  fi
                  if [ -d ".external_modules" ]; then
                      ln -sfn "$(readlink -f .external_modules)" "$path/.external_modules"
                  fi

                  if [ "$IS_PARALLEL" == "true" ]; then
                      run_terraform_process "$path" "$ACTION" "$target_auth" "$provider" &
                      pids="$pids $!"
                  else
                      run_terraform_process "$path" "$ACTION" "$target_auth" "$provider"
                      if [ $? -ne 0 ]; then failed=1; break; fi
                  fi
              done <<< "$STATES_JSON"

              if [ "$IS_PARALLEL" == "true" ]; then
                  for pid in $pids; do
                      wait $pid
                      if [ $? -ne 0 ]; then failed=1; fi
                  done
              fi

              if [ $failed -ne 0 ]; then
                  echo "::error::Falha no estágio $STAGE_NAME"
                  exit 1
              fi
              echo "::endgroup::"
          done
          echo "✅ Pipeline finalizado."
